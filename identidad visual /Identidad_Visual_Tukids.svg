<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap');
      .title { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 48px; fill: #2D3436; }
      .subtitle { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 32px; fill: #2D3436; }
      .text { font-family: 'Inter', sans-serif; font-size: 18px; fill: #4A5568; }
      .code { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 16px; fill: #8E8E93; }
      .swatch { rx: 24; ry: 24; }
      .swatch-sm { rx: 6; ry: 6; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#FAFAFA" />
  
  <!-- Header -->
  <text x="80" y="100" class="title">TUKIDS <tspan fill="#FF8C7A">Identidad Visual</tspan></text>
  <line x1="80" y1="130" x2="1120" y2="130" stroke="#F0F0F2" stroke-width="2" />

  <!-- Colors Section -->
  <text x="80" y="200" class="subtitle">Paleta de Colores</text>
  
  <!-- Coral -->
  <rect x="80" y="240" width="140" height="140" fill="#FF8C7A" class="swatch" />
  <rect x="80" y="400" width="40" height="24" fill="#F0705C" class="swatch-sm" />
  <rect x="130" y="400" width="40" height="24" fill="#FFB3A7" class="swatch-sm" />
  <rect x="180" y="400" width="40" height="24" fill="#FFF0EE" class="swatch-sm" />
  <text x="80" y="450" class="text" font-weight="600" fill="#2D3436">Coral (Principal)</text>
  <text x="80" y="475" class="code">#FF8C7A</text>
  
  <!-- Mint -->
  <rect x="250" y="240" width="140" height="140" fill="#7DD8C7" class="swatch" />
  <rect x="250" y="400" width="40" height="24" fill="#5EC4B1" class="swatch-sm" />
  <rect x="300" y="400" width="40" height="24" fill="#B2EDE6" class="swatch-sm" />
  <rect x="350" y="400" width="40" height="24" fill="#EDFAF8" class="swatch-sm" />
  <text x="250" y="450" class="text" font-weight="600" fill="#2D3436">Mint (Secundario)</text>
  <text x="250" y="475" class="code">#7DD8C7</text>

  <!-- Yellow -->
  <rect x="420" y="240" width="140" height="140" fill="#FFD97D" class="swatch" />
  <rect x="420" y="400" width="40" height="24" fill="#F5C842" class="swatch-sm" />
  <rect x="470" y="400" width="40" height="24" fill="#FFFBEE" class="swatch-sm" />
  <text x="420" y="450" class="text" font-weight="600" fill="#2D3436">Yellow (Acento)</text>
  <text x="420" y="475" class="code">#FFD97D</text>

  <!-- Lilac -->
  <rect x="590" y="240" width="140" height="140" fill="#B8A4E3" class="swatch" />
  <rect x="590" y="400" width="40" height="24" fill="#9B85D4" class="swatch-sm" />
  <rect x="640" y="400" width="40" height="24" fill="#F3F0FC" class="swatch-sm" />
  <text x="590" y="450" class="text" font-weight="600" fill="#2D3436">Lilac (Acento)</text>
  <text x="590" y="475" class="code">#B8A4E3</text>

  <!-- Sky -->
  <rect x="760" y="240" width="140" height="140" fill="#A8D8EA" class="swatch" />
  <rect x="760" y="400" width="40" height="24" fill="#82C4DB" class="swatch-sm" />
  <rect x="810" y="400" width="40" height="24" fill="#EDF7FC" class="swatch-sm" />
  <text x="760" y="450" class="text" font-weight="600" fill="#2D3436">Sky (Acento)</text>
  <text x="760" y="475" class="code">#A8D8EA</text>

  <!-- Carbon -->
  <rect x="930" y="240" width="140" height="140" fill="#2D3436" class="swatch" />
  <rect x="930" y="400" width="40" height="24" fill="#4A5568" class="swatch-sm" />
  <rect x="980" y="400" width="40" height="24" fill="#8E8E93" class="swatch-sm" />
  <text x="930" y="450" class="text" font-weight="600" fill="#2D3436">Carbon (Texto)</text>
  <text x="930" y="475" class="code">#2D3436</text>


  <!-- Typography Section -->
  <text x="80" y="570" class="subtitle">Tipografía</text>
  
  <g transform="translate(80, 610)">
    <text x="0" y="40" font-family="Poppins" font-size="80" font-weight="700" fill="#2D3436">Aa</text>
    <text x="100" y="15" font-family="Poppins" font-size="24" font-weight="700" fill="#2D3436">Poppins</text>
    <text x="100" y="40" class="text">Uso: Títulos, Encabezados, Botones (--font-title)</text>
    <text x="100" y="65" class="code">Pesos: Regular (400) a ExtraBold (800)</text>
    <text x="0" y="110" font-family="Poppins" font-size="28" font-weight="600" fill="#4A5568">La curiosidad lleva a grandes descubrimientos.</text>
  </g>

  <g transform="translate(80, 760)">
    <text x="0" y="40" font-family="Inter" font-size="80" font-weight="600" fill="#2D3436">Aa</text>
    <text x="100" y="15" font-family="Inter" font-size="24" font-weight="600" fill="#2D3436">Inter</text>
    <text x="100" y="40" class="text">Uso: Cuerpo de texto, Párrafos, UI (--font-body)</text>
    <text x="100" y="65" class="code">Pesos: Regular (400), Medium (500), SemiBold (600)</text>
    <text x="0" y="110" font-family="Inter" font-size="22" font-weight="400" fill="#4A5568">Nuestra plataforma está diseñada para ser intuitiva y divertida.</text>
  </g>

  <!-- Vector Styles Section -->
  <text x="760" y="570" class="subtitle">Estilos de Vectores</text>
  <text x="760" y="610" class="text" width="400">Iconografía tipo "Outline / Stroke"</text>
  <text x="760" y="640" class="text">✓ Grosor de línea (stroke-width): 2px</text>
  <text x="760" y="670" class="text">✓ Terminaciones redondeadas (round)</text>
  <text x="760" y="700" class="text">✓ Diseño limpio y minimalista</text>
  
  <g transform="translate(760, 740)" stroke="#2D3436" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Icon Box -->
    <rect x="-20" y="-20" width="280" height="100" rx="16" fill="#F0F0F2" stroke="none" />
    
    <!-- Heart Icon -->
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" transform="translate(10, 10) scale(1.5)" />
    
    <!-- User Icon -->
    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" transform="translate(90, 10) scale(1.5)"/>
    <circle cx="12" cy="7" r="4" transform="translate(90, 10) scale(1.5)"/>
    
    <!-- Home Icon -->
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" transform="translate(170, 10) scale(1.5)"/>
    <polyline points="9 22 9 12 15 12 15 22" transform="translate(170, 10) scale(1.5)"/>
  </g>
</svg>
